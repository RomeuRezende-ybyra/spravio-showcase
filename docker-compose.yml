services:
  postgres:
    image: postgres:15-alpine
    container_name: spravio_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trackingproject
    ports:
      - '5435:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - spravio-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spravio_redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    networks:
      - spravio-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: spravio_api
    restart: unless-stopped
    ports:
      - '3010:3010'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/trackingproject
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-docker-dev-secret-change-in-prod}
      PORT: '3010'
      NODE_ENV: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3011,https://spravio.io}
    networks:
      - spravio-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Build-time: usa rede interna do Docker para SSR
        NEXT_PUBLIC_API_URL: http://api:3010
    container_name: spravio_web
    restart: unless-stopped
    ports:
      - '3011:3000'
    environment:
      # Runtime: URL pública para client-side
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.spravio.io}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://spravio.io}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-docker-dev-secret-change-in-prod}
      NODE_ENV: production
    networks:
      - spravio-network
    depends_on:
      - api

networks:
  spravio-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
