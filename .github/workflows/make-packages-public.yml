name: Make GHCR Packages Public

on:
  workflow_dispatch:

jobs:
  make-public:
    name: Make packages public
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Make spravio-api public
        run: |
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user/packages/container/spravio-api \
            -d '{"visibility":"public"}'

      - name: Make spravio-web public
        run: |
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user/packages/container/spravio-web \
            -d '{"visibility":"public"}'

      - name: Verify packages are public
        run: |
          echo "✅ Packages should now be public"
          echo ""
          echo "Verify at:"
          echo "  https://github.com/users/${{ github.repository_owner }}/packages/container/spravio-api"
          echo "  https://github.com/users/${{ github.repository_owner }}/packages/container/spravio-web"
