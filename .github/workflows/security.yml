name: Security Scan

on:
  schedule:
    # Run weekly on Monday at 2 AM UTC
    - cron: '0 2 * * 1'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level moderate
        continue-on-error: true

  docker-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t spravio-api:scan .

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: spravio-api:scan
          format: 'table'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln'
          ignore-unfixed: true

      - name: Build Web image
        run: docker build -f apps/web/Dockerfile -t spravio-web:scan .

      - name: Scan Web image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: spravio-web:scan
          format: 'table'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln'
          ignore-unfixed: true
