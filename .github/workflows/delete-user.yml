name: Delete User

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Email of user to delete'
        required: true
        type: string

jobs:
  delete-user:
    name: Delete User from Production DB
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Delete user via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            cd /opt/spravio

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🗑️  Deleting user: ${{ inputs.email }}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""

            # Create inline deletion script
            cat > /tmp/delete-user.mjs <<'EOF'
            import { PrismaClient } from '@prisma/client'

            const prisma = new PrismaClient()
            const email = process.env.USER_EMAIL

            async function deleteUser() {
              console.log(`🔍 Looking for user: ${email}`)

              const user = await prisma.user.findUnique({
                where: { email },
                include: {
                  organizations: { include: { organization: true } },
                  accounts: true,
                  sessions: true,
                  assignments: true,
                },
              })

              if (!user) {
                console.log(`❌ User not found: ${email}`)
                process.exit(1)
              }

              console.log(`\n📊 User details:`)
              console.log(`   ID: ${user.id}`)
              console.log(`   Name: ${user.name || 'N/A'}`)
              console.log(`   Email: ${user.email}`)
              console.log(`   Created: ${user.createdAt}`)
              console.log(`\n🔗 Related data:`)
              console.log(`   Organizations: ${user.organizations.length}`)
              user.organizations.forEach(org => {
                console.log(`      - ${org.organization.name} (${org.role})`)
              })
              console.log(`   OAuth Accounts: ${user.accounts.length}`)
              console.log(`   Active Sessions: ${user.sessions.length}`)
              console.log(`   Project Assignments: ${user.assignments.length}`)

              console.log(`\n⚠️  WARNING: This will CASCADE DELETE all related data!`)
              console.log(`\n🗑️  Deleting user...`)

              await prisma.user.delete({ where: { email } })

              console.log(`\n✅ User deleted successfully!`)
              console.log(`   Cascade deleted:`)
              console.log(`   - ${user.organizations.length} organization membership(s)`)
              console.log(`   - ${user.accounts.length} account(s)`)
              console.log(`   - ${user.sessions.length} session(s)`)
              console.log(`   - ${user.assignments.length} assignment(s)`)
            }

            deleteUser()
              .catch(console.error)
              .finally(() => prisma.$disconnect())
            EOF

            # Run deletion script inside API container (from /app where node_modules are)
            docker compose exec -T api sh -c "
              cd /app
              export USER_EMAIL='${{ inputs.email }}'
              cat > /app/delete-user-temp.mjs <<'INNEREOF'
            $(cat /tmp/delete-user.mjs)
            INNEREOF
              node /app/delete-user-temp.mjs
              rm /app/delete-user-temp.mjs
            "

            rm /tmp/delete-user.mjs

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ Deletion completed"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
