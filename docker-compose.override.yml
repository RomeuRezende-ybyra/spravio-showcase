# Dev overrides — volume mounts for hot-reload
# This file is automatically loaded by `docker compose up`
# For production, use: docker compose -f docker-compose.yml up

services:
  api:
    build:
      target: deps
    command: ["pnpm", "--filter", "@spravio/api", "dev"]
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
      - ./packages/types/src:/app/packages/types/src
      - ./packages/utils/src:/app/packages/utils/src
    environment:
      NODE_ENV: development

  web:
    build:
      target: deps
    command: ["pnpm", "--filter", "@spravio/web", "dev"]
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./packages/types/src:/app/packages/types/src
      - ./packages/utils/src:/app/packages/utils/src
    environment:
      NODE_ENV: development
