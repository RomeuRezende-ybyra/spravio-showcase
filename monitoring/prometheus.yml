global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'spravio-monitor'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Load rules
rule_files:
  - 'alerts.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter (system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # Spravio API health endpoint
  - job_name: 'spravio-api'
    metrics_path: '/health/detailed'
    static_configs:
      - targets: ['host.docker.internal:3020'] # Local test
      # - targets: ['api.spravio.io:443'] # Production

  # Blackbox exporter for uptime monitoring
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://host.docker.internal:3020/health  # API
          - http://host.docker.internal:3021         # Web
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115
