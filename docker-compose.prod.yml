services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${API_IMAGE:-ghcr.io/your-org/spravio-api}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      PORTAL_SECRET: ${PORTAL_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ALLOWED_ORIGINS: https://${DOMAIN},https://www.${DOMAIN}
      PORT: '3010'
      NODE_ENV: production
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      JIRA_CLOUD_ID: ${JIRA_CLOUD_ID:-}
      GH_INTEGRATION_TOKEN: ${GH_INTEGRATION_TOKEN:-}
      GITHUB_ORG: ${GITHUB_ORG:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.spravio-api.rule=Host(`api.${DOMAIN}`)
      - traefik.http.routers.spravio-api.entrypoints=websecure
      - traefik.http.routers.spravio-api.tls.certresolver=letsencrypt
      - traefik.http.routers.spravio-api.middlewares=security-headers@file,compress@file
      - traefik.http.services.spravio-api.loadbalancer.server.port=3010
      - com.centurylinklabs.watchtower.scope=spravio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: ${WEB_IMAGE:-ghcr.io/your-org/spravio-web}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN:-spravio.io}
    restart: unless-stopped
    environment:
      NEXTAUTH_URL: https://${DOMAIN}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      # Main router (spravio.io)
      - traefik.http.routers.spravio-web.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.spravio-web.entrypoints=websecure
      - traefik.http.routers.spravio-web.tls.certresolver=letsencrypt
      - traefik.http.routers.spravio-web.middlewares=security-headers@file,compress@file
      # WWW redirect router (www.spravio.io → spravio.io)
      - traefik.http.routers.spravio-web-www.rule=Host(`www.${DOMAIN}`)
      - traefik.http.routers.spravio-web-www.entrypoints=websecure
      - traefik.http.routers.spravio-web-www.tls.certresolver=letsencrypt
      - traefik.http.routers.spravio-web-www.middlewares=www-to-root@docker
      - traefik.http.middlewares.www-to-root.redirectregex.regex=^https://www\.(.+)
      - traefik.http.middlewares.www-to-root.redirectregex.replacement=https://$${1}
      - traefik.http.middlewares.www-to-root.redirectregex.permanent=true
      - traefik.http.services.spravio-web.loadbalancer.server.port=3000
      - com.centurylinklabs.watchtower.scope=spravio
    depends_on:
      - api

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "60"
      WATCHTOWER_SCOPE: "spravio"
      WATCHTOWER_ROLLING_RESTART: "true"
      DOCKER_API_VERSION: "1.43"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - com.centurylinklabs.watchtower.scope=spravio

volumes:
  postgres_data:
  redis_data:

networks:
  proxy:
    external: true
