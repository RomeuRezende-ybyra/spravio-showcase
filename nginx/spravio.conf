# Spravio - Nginx Reverse Proxy Configuration
# Place this in: /etc/nginx/sites-available/spravio
# Then: sudo ln -s /etc/nginx/sites-available/spravio /etc/nginx/sites-enabled/

# Upstream servers
upstream spravio_web {
    server localhost:3011;
}

upstream spravio_api {
    server localhost:3010;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name spravio.io www.spravio.io api.spravio.io;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main Frontend - spravio.io
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name spravio.io www.spravio.io;

    # SSL certificates (will be configured by certbot)
    ssl_certificate /etc/letsencrypt/live/spravio.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spravio.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript;

    # Proxy to Next.js
    location / {
        proxy_pass http://spravio_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    access_log /var/log/nginx/spravio_web_access.log;
    error_log /var/log/nginx/spravio_web_error.log;
}

# API Backend - api.spravio.io
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.spravio.io;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/spravio.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spravio.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy to Fastify API
    location / {
        proxy_pass http://spravio_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/spravio_api_access.log;
    error_log /var/log/nginx/spravio_api_error.log;
}
